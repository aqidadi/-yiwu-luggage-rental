<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>海克斯大乱斗助手</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05080f;
  --bg2: #0d1117;
  --bg3: #111827;
  --panel: #0f1623;
  --border: #1e2d47;
  --gold: #C89B3C;
  --gold2: #F0D07A;
  --teal: #0BC4C2;
  --teal2: #52e8e6;
  --red: #e84057;
  --blue: #5b7fda;
  --text: #ccd3da;
  --text2: #7a8fa6;
  --s: #ff6b35;
  --a: #C89B3C;
  --b: #5b7fda;
  --c: #4a5568;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BG texture ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 10% 20%, rgba(11,196,194,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(200,155,60,0.06) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

/* ── Header ── */
.header {
  position: sticky; top:0; z-index:100;
  background: rgba(5,8,15,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.header-inner {
  max-width:900px; margin:0 auto;
  display:flex; align-items:center; gap:10px;
  height:52px;
}
.logo-hex {
  width:36px; height:36px;
  background: linear-gradient(135deg, var(--gold), var(--teal));
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani',sans-serif;
  font-weight:700; font-size:14px; color:#000;
  flex-shrink:0;
}
.header-title {
  font-family:'Rajdhani',sans-serif;
  font-size:18px; font-weight:700;
  background: linear-gradient(90deg, var(--gold2), var(--teal2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:1px;
}
.header-sub {
  font-size:11px; color:var(--text2); margin-left:auto;
  white-space:nowrap;
}

/* ── Tabs ── */
.tabs {
  display:flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position:sticky; top:52px; z-index:99;
}
.tab {
  flex:1; padding:12px 4px;
  text-align:center; font-size:12px; font-weight:500;
  color:var(--text2); cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s; letter-spacing:.5px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.tab .ti { font-size:16px; }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.tab:hover:not(.active) { color:var(--text); }

/* ── Content ── */
.content { max-width:900px; margin:0 auto; padding:0 12px 80px; position:relative; z-index:1; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── Search & Filter ── */
.search-row {
  padding:14px 0 10px;
  display:flex; gap:8px;
}
.search-box {
  flex:1; height:38px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:0 14px 0 36px;
  color:var(--text); font-size:13px; outline:none;
  transition:.2s;
}
.search-box:focus { border-color:var(--teal); }
.search-wrap { position:relative; flex:1; }
.search-icon {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  color:var(--text2); font-size:14px; pointer-events:none;
}
.filter-row {
  display:flex; gap:6px; flex-wrap:wrap; padding-bottom:12px;
}
.filter-btn {
  padding:4px 12px; border-radius:20px; font-size:11px; font-weight:500;
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text2); cursor:pointer; transition:.2s; white-space:nowrap;
}
.filter-btn.active { background:rgba(200,155,60,0.15); border-color:var(--gold); color:var(--gold); }

/* ── Champion Grid ── */
.champ-grid {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:8px; padding-bottom:16px;
}
@media(min-width:480px){ .champ-grid { grid-template-columns: repeat(6,1fr); } }
@media(min-width:600px){ .champ-grid { grid-template-columns: repeat(8,1fr); } }

.champ-card {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; padding:6px 4px; border-radius:10px;
  border:1px solid transparent; transition:.2s;
}
.champ-card:hover { background:rgba(11,196,194,0.06); border-color:rgba(11,196,194,0.3); }
.champ-card.selected { background:rgba(200,155,60,0.12); border-color:var(--gold); }

.champ-hex-wrap {
  width:52px; height:52px; position:relative;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  transition:.2s;
}
.champ-card:hover .champ-hex-wrap { filter: drop-shadow(0 0 8px rgba(11,196,194,0.5)); }
.champ-card.selected .champ-hex-wrap { filter: drop-shadow(0 0 10px rgba(200,155,60,0.6)); }

.hex-bg {
  width:52px; height:52px;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  position:absolute; inset:0;
}
.champ-img {
  width:52px; height:52px;
  clip-path: polygon(50% 2%,98% 26%,98% 74%,50% 98%,2% 74%,2% 26%);
  object-fit:cover; object-position:top center;
  position:absolute; inset:0;
}
.champ-fallback {
  width:52px; height:52px;
  clip-path: polygon(50% 2%,98% 26%,98% 74%,50% 98%,2% 74%,2% 26%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px;
  position:absolute; inset:0;
}
.wr-dot {
  position:absolute; bottom:-2px; right:-2px;
  width:14px; height:14px; border-radius:50%;
  border:1px solid var(--bg2);
  font-size:7px; display:flex; align-items:center; justify-content:center;
  font-weight:700;
}
.champ-name-small {
  font-size:10px; color:var(--text2); text-align:center;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  width:100%; line-height:1.2;
}
.champ-card.selected .champ-name-small { color:var(--gold); }

/* ── Analysis Panel ── */
.analysis-panel {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  animation: slideUp .3s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.panel-header {
  padding:16px;
  background: linear-gradient(135deg, rgba(200,155,60,0.12), rgba(11,196,194,0.08));
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:14px;
}
.panel-hero-hex { width:64px; height:64px; position:relative; flex-shrink:0; }
.panel-hero-hex .hex-bg {
  width:64px; height:64px;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
.panel-hero-hex .champ-img, .panel-hero-hex .champ-fallback {
  width:64px; height:64px;
  clip-path: polygon(50% 2%,98% 26%,98% 74%,50% 98%,2% 74%,2% 26%);
}
.panel-hero-hex .champ-fallback { font-size:18px; }
.panel-info { flex:1; }
.panel-name {
  font-size:20px; font-weight:700;
  font-family:'Rajdhani',sans-serif; letter-spacing:1px;
  color:var(--gold2);
}
.panel-name-cn { font-size:12px; color:var(--text2); margin-top:1px; }
.badge-row { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; }
.badge {
  padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700;
  letter-spacing:.5px;
}
.badge-role { background:rgba(91,127,218,0.2); color:var(--blue); border:1px solid rgba(91,127,218,0.3); }
.badge-dmg-magic { background:rgba(138,43,226,0.2); color:#d580ff; border:1px solid rgba(138,43,226,0.3); }
.badge-dmg-phys { background:rgba(232,64,87,0.2); color:#ff7a8a; border:1px solid rgba(232,64,87,0.3); }
.badge-dmg-mix { background:rgba(200,155,60,0.2); color:var(--gold); border:1px solid rgba(200,155,60,0.3); }
.badge-wr { padding:2px 10px; border-radius:4px; font-size:11px; font-weight:700; }
.badge-wr.hot { background:rgba(11,196,194,0.2); color:var(--teal2); border:1px solid rgba(11,196,194,0.3); }
.badge-wr.avg { background:rgba(91,127,218,0.2); color:var(--blue); border:1px solid rgba(91,127,218,0.3); }
.badge-wr.low { background:rgba(232,64,87,0.15); color:var(--red); border:1px solid rgba(232,64,87,0.25); }

.diff-stars { display:flex; gap:2px; align-items:center; }
.star { font-size:11px; }
.star.on { color:var(--gold); }
.star.off { color:var(--border); }

.panel-body { padding:14px 16px; }

.section-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  color:var(--teal); margin-bottom:8px; text-transform:uppercase;
  display:flex; align-items:center; gap:6px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

.sw-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.sw-box { background:var(--bg3); border-radius:10px; padding:10px 12px; border:1px solid var(--border); }
.sw-title { font-size:10px; font-weight:700; letter-spacing:1px; margin-bottom:6px; }
.sw-title.s { color:#4ade80; }
.sw-title.w { color:var(--red); }
.sw-item {
  display:flex; align-items:flex-start; gap:5px;
  font-size:11px; color:var(--text2); line-height:1.4; margin-bottom:3px;
}
.sw-item::before { content:'•'; flex-shrink:0; margin-top:1px; }
.sw-item.s::before { color:#4ade80; }
.sw-item.w::before { color:var(--red); }

.tips-list { margin-bottom:14px; }
.tip-item {
  background:var(--bg3); border-radius:8px; padding:9px 12px;
  font-size:12px; color:var(--text); line-height:1.5;
  border-left:3px solid var(--gold);
  margin-bottom:6px;
}

.counter-row { display:flex; gap:6px; flex-wrap:wrap; }
.counter-chip {
  padding:3px 10px; border-radius:20px; font-size:11px;
  background:rgba(232,64,87,0.12); color:#ff9aa7;
  border:1px solid rgba(232,64,87,0.25);
}

/* ── Matchup Tab ── */
.matchup-selectors {
  display:grid; grid-template-columns:1fr auto 1fr; gap:10px;
  align-items:start; padding:14px 0;
}
.vs-label {
  display:flex; align-items:center; justify-content:center;
  padding-top:28px;
  font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700;
  color:var(--red);
}
.selector-label { font-size:11px; color:var(--text2); margin-bottom:6px; letter-spacing:1px; }
.champ-select {
  width:100%; height:38px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:0 10px;
  color:var(--text); font-size:12px; outline:none;
  font-family:'Noto Sans SC',sans-serif;
}
.champ-select:focus { border-color:var(--teal); }

.matchup-result {
  background:var(--panel); border:1px solid var(--border);
  border-radius:14px; overflow:hidden;
  animation: slideUp .3s ease;
}
.matchup-header {
  padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.matchup-vs-row {
  display:flex; align-items:center; gap:10px;
}
.matchup-champ { text-align:center; }
.matchup-champ-img {
  width:48px; height:48px;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  object-fit:cover; object-position:top center;
  margin-bottom:4px;
}
.matchup-champ-name { font-size:10px; color:var(--text2); }
.matchup-rating {
  text-align:center; flex:1;
}
.rating-badge {
  display:inline-block;
  padding:6px 16px; border-radius:8px;
  font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700;
  letter-spacing:1px; margin-bottom:4px;
}
.rating-favor { background:rgba(74,222,128,0.15); color:#4ade80; border:1px solid rgba(74,222,128,0.3); }
.rating-even  { background:rgba(200,155,60,0.15); color:var(--gold); border:1px solid rgba(200,155,60,0.3); }
.rating-hard  { background:rgba(232,64,87,0.15); color:var(--red); border:1px solid rgba(232,64,87,0.3); }
.rating-sub { font-size:10px; color:var(--text2); }
.matchup-body { padding:14px 16px; }
.matchup-tip {
  background:var(--bg3); border-radius:8px; padding:9px 12px;
  font-size:12px; line-height:1.5; margin-bottom:6px;
  border-left:3px solid var(--teal);
  color:var(--text);
}

/* ── Augment Tab ── */
.aug-context {
  padding:12px 0 4px;
  font-size:12px; color:var(--text2);
}
.aug-context span { color:var(--gold); font-weight:500; }
.aug-select-row {
  padding:8px 0 14px;
  display:flex; gap:8px; align-items:center;
}
.aug-select-row .champ-select { max-width:200px; }

.aug-grid {
  display:flex; flex-direction:column; gap:10px;
}
.aug-card {
  background:var(--panel); border-radius:12px;
  border:1px solid var(--border); overflow:hidden;
  display:flex; align-items:stretch;
  transition:.2s;
}
.aug-card:hover { border-color:rgba(200,155,60,0.4); }
.aug-tier-bar {
  width:5px; flex-shrink:0;
}
.aug-tier-bar.S { background: linear-gradient(180deg,#ff6b35,#ff4500); }
.aug-tier-bar.A { background: linear-gradient(180deg,var(--gold),#a07020); }
.aug-tier-bar.B { background: linear-gradient(180deg,var(--blue),#3a5ab0); }
.aug-inner { padding:12px 14px; flex:1; }
.aug-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.aug-tier-badge {
  width:24px; height:24px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px;
  flex-shrink:0;
}
.aug-tier-badge.S { background:rgba(255,107,53,0.2); color:#ff6b35; border:1px solid rgba(255,107,53,0.4); }
.aug-tier-badge.A { background:rgba(200,155,60,0.2); color:var(--gold); border:1px solid rgba(200,155,60,0.4); }
.aug-tier-badge.B { background:rgba(91,127,218,0.2); color:var(--blue); border:1px solid rgba(91,127,218,0.4); }
.aug-name { font-size:14px; font-weight:700; color:var(--text); }
.aug-hex-icon {
  margin-left:auto;
  width:28px; height:28px; flex-shrink:0;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-size:12px;
}
.aug-reason { font-size:12px; color:var(--text2); line-height:1.5; }

/* ── Empty state ── */
.empty-state {
  text-align:center; padding:40px 20px;
  color:var(--text2); font-size:13px;
}
.empty-icon { font-size:36px; margin-bottom:10px; opacity:.5; }

/* ── Placeholder ── */
.select-prompt {
  background:var(--panel); border:1px dashed var(--border);
  border-radius:14px; padding:28px 20px; text-align:center;
  color:var(--text2); font-size:12px; margin-bottom:8px;
}
.select-prompt .pi { font-size:28px; margin-bottom:8px; opacity:.6; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-hex">H</div>
    <div>
      <div class="header-title">海克斯大乱斗助手</div>
    </div>
    <div class="header-sub">ARAM · 分析工具</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('analysis')">
    <span class="ti">🧬</span>英雄分析
  </div>
  <div class="tab" onclick="switchTab('matchup')">
    <span class="ti">⚔️</span>对战分析
  </div>
  <div class="tab" onclick="switchTab('augment')">
    <span class="ti">💎</span>海克斯
  </div>
</div>

<div class="content">

  <!-- ── Tab 1: Champion Analysis ── -->
  <div class="tab-panel active" id="tab-analysis">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-box" id="search-input" placeholder="搜索英雄..." oninput="filterChamps()">
      </div>
    </div>
    <div class="filter-row" id="filter-row">
      <div class="filter-btn active" onclick="setFilter('all',this)">全部</div>
      <div class="filter-btn" onclick="setFilter('法师',this)">法师</div>
      <div class="filter-btn" onclick="setFilter('射手',this)">射手</div>
      <div class="filter-btn" onclick="setFilter('辅助',this)">辅助</div>
      <div class="filter-btn" onclick="setFilter('战士',this)">战士</div>
      <div class="filter-btn" onclick="setFilter('刺客',this)">刺客</div>
    </div>
    <div class="champ-grid" id="champ-grid"></div>
    <div id="analysis-output">
      <div class="select-prompt">
        <div class="pi">🧳</div>
        <div>点击上方英雄头像查看详细分析</div>
      </div>
    </div>
  </div>

  <!-- ── Tab 2: Matchup ── -->
  <div class="tab-panel" id="tab-matchup">
    <div class="matchup-selectors">
      <div>
        <div class="selector-label">我方英雄</div>
        <select class="champ-select" id="my-champ" onchange="calcMatchup()">
          <option value="">选择英雄</option>
        </select>
      </div>
      <div class="vs-label">VS</div>
      <div>
        <div class="selector-label">敌方英雄</div>
        <select class="champ-select" id="enemy-champ" onchange="calcMatchup()">
          <option value="">选择英雄</option>
        </select>
      </div>
    </div>
    <div id="matchup-output">
      <div class="select-prompt">
        <div class="pi">⚔️</div>
        <div>选择双方英雄后查看对线分析</div>
      </div>
    </div>
  </div>

  <!-- ── Tab 3: Augments ── -->
  <div class="tab-panel" id="tab-augment">
    <div class="aug-select-row">
      <span style="font-size:12px;color:var(--text2)">选择英雄：</span>
      <select class="champ-select" id="aug-champ-select" onchange="renderAugments()">
        <option value="">选择英雄</option>
      </select>
    </div>
    <div id="augment-output">
      <div class="select-prompt">
        <div class="pi">💎</div>
        <div>选择英雄后查看推荐海克斯强化</div>
      </div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   CHAMPION DATA
═══════════════════════════════════════ */
const CHAMPS = [
  {
    id:'Lux', name:'Lux', name_cn:'璐璐', role:'法师',
    diff:1, dmg:'魔法', wr:53.2,
    colors:['#9b59b6','#3498db'],
    strengths:['超远距离消耗','W盾保护自己和队友','R冷却短可频繁清线'],
    weaknesses:['位移技能少，容易被突进','E技能需要预判','无法独立对抗强突进英雄'],
    tips:['尽量站后排用E骚扰','W主动放在队友身上保命','R冷却好了就打，不用等完美机会','注意站位避免被对面控制'],
    counters:['Zed','Katarina','Yasuo','Blitzcrank'],
    augments:[
      {name:'光之印记', tier:'S', reason:'增强技能伤害，E击中即触发，每次消耗伤害直线提升', icon:'✨'},
      {name:'宇宙洞察', tier:'A', reason:'冷却缩减让R和E更频繁，大乱斗中续航更强', icon:'🌌'},
      {name:'蓝色魔法书', tier:'A', reason:'免费技能释放配合E持续骚扰，消耗优势明显', icon:'📘'},
    ]
  },
  {
    id:'Jinx', name:'Jinx', name_cn:'金克丝', role:'射手',

═══════════════════════════════════════ */
function init() {
  renderChampGrid();
  populateSelects();
}

function getImgUrl(id) {
  return `https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/${id}.png`;
}

function getRoleColor(role) {
  const map = {'法师':'#8b5cf6','射手':'#06b6d4','辅助':'#10b981','战士':'#f59e0b','刺客':'#ef4444','特殊':'#64748b'};
  return map[role] || '#64748b';
}

function getWrClass(wr) {
  if (wr >= 54) return 'hot';
  if (wr >= 51) return 'avg';
  return 'low';
}

function hexFallbackStyle(champ) {
  return `background:linear-gradient(135deg,${champ.colors[0]},${champ.colors[1]})`;
}

/* ═══════════════════════════════════════
   TAB
═══════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['analysis','matchup','augment'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}

/* ═══════════════════════════════════════
   CHAMPION GRID
═══════════════════════════════════════ */
function renderChampGrid() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const grid = document.getElementById('champ-grid');
  grid.innerHTML = '';

  const filtered = CHAMPS.filter(c => {
    const matchFilter = currentFilter === 'all' || c.role === currentFilter;
    const matchSearch = !query || c.name_cn.includes(query) || c.name.toLowerCase().includes(query);
    return matchFilter && matchSearch;
  });

  filtered.forEach(c => {
    const div = document.createElement('div');
    div.className = 'champ-card' + (selectedChamp?.id === c.id ? ' selected' : '');
    div.onclick = () => selectChamp(c.id);

    const wrColor = c.wr >= 54 ? '#0BC4C2' : c.wr >= 51 ? '#5b7fda' : '#e84057';
    div.innerHTML = `
      <div class="champ-hex-wrap">
        <div class="hex-bg" style="background:linear-gradient(135deg,${c.colors[0]},${c.colors[1]})"></div>
        <img class="champ-img" src="${getImgUrl(c.id)}" alt="${c.name_cn}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="champ-fallback" style="${hexFallbackStyle(c)};display:none">
          ${c.name_cn.slice(0,2)}
        </div>
        <div class="wr-dot" style="background:${wrColor};color:#fff">${c.wr}%</div>
      </div>
      <div class="champ-name-small">${c.name_cn}</div>
    `;
    grid.appendChild(div);
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text2);font-size:12px">没有找到匹配英雄</div>';
  }
}

function filterChamps() { renderChampGrid(); }
function setFilter(role, el) {
  currentFilter = role;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderChampGrid();
}

/* ═══════════════════════════════════════
   SELECT CHAMPION
═══════════════════════════════════════ */
function selectChamp(id) {
  selectedChamp = CHAMPS.find(c => c.id === id);
  renderChampGrid();
  renderAnalysis();
  // sync selects
  document.getElementById('my-champ').value = id;
  document.getElementById('aug-champ-select').value = id;
  calcMatchup();
  renderAugments();
}

function renderAnalysis() {
  const c = selectedChamp;
  if (!c) return;

  const dmgClass = c.dmg === '魔法' ? 'badge-dmg-magic' : c.dmg === '物理' ? 'badge-dmg-phys' : 'badge-dmg-mix';
  const stars = [1,2,3].map(i => `<span class="star ${i<=c.diff?'on':'off'}">★</span>`).join('');
  const wrCls = getWrClass(c.wr);

  const strengths = c.strengths.map(s => `<div class="sw-item s">${s}</div>`).join('');
  const weaknesses = c.weaknesses.map(w => `<div class="sw-item w">${w}</div>`).join('');
  const tips = c.tips.map(t => `<div class="tip-item">${t}</div>`).join('');
  const counters = c.counters.map(n => {
    const found = CHAMPS.find(x => x.id === n);
    return `<span class="counter-chip">${found ? found.name_cn : n}</span>`;
  }).join('');

  document.getElementById('analysis-output').innerHTML = `
    <div class="analysis-panel">
      <div class="panel-header">
        <div class="panel-hero-hex">
          <div class="hex-bg" style="background:linear-gradient(135deg,${c.colors[0]},${c.colors[1]})"></div>
          <img class="champ-img" src="${getImgUrl(c.id)}" alt="${c.name_cn}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="champ-fallback" style="${hexFallbackStyle(c)};display:none;font-size:18px">
            ${c.name_cn.slice(0,2)}
          </div>
        </div>
        <div class="panel-info">
          <div class="panel-name">${c.name}</div>
          <div class="panel-name-cn">${c.name_cn}</div>
          <div class="badge-row">
            <span class="badge badge-role">${c.role}</span>
            <span class="badge ${dmgClass}">${c.dmg}伤害</span>
            <span class="badge badge-wr ${wrCls}">大乱斗 ${c.wr}%</span>
            <span class="diff-stars">${stars}</span>
          </div>
        </div>
      </div>
      <div class="panel-body">
        <div class="section-label">优劣势</div>
        <div class="sw-grid">
          <div class="sw-box"><div class="sw-title s">✅ 优势</div>${strengths}</div>
          <div class="sw-box"><div class="sw-title w">❌ 劣势</div>${weaknesses}</div>
        </div>

        <div class="section-label">大乱斗攻略</div>
        <div class="tips-list">${tips}</div>

        <div class="section-label">克制英雄</div>
        <div class="counter-row">${counters}</div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════
   MATCHUP
═══════════════════════════════════════ */
function populateSelects() {
  const opts = CHAMPS.map(c => `<option value="${c.id}">${c.name_cn} (${c.name})</option>`).join('');
  ['my-champ','enemy-champ','aug-champ-select'].forEach(id => {
    document.getElementById(id).innerHTML += opts;
  });
}

function calcMatchup() {
  const myId = document.getElementById('my-champ').value;
  const enId = document.getElementById('enemy-champ').value;
  if (!myId || !enId || myId === enId) {
    document.getElementById('matchup-output').innerHTML = `<div class="select-prompt"><div class="pi">⚔️</div><div>请选择不同的两个英雄</div></div>`;
    return;
  }

  const my = CHAMPS.find(c => c.id === myId);
  const en = CHAMPS.find(c => c.id === enId);

  // Look up matchup data
  let data = MATCHUPS[myId]?.[enId] || MATCHUPS[enId]?.[myId];
  let flipped = false;
  if (!data && MATCHUPS[enId]?.[myId]) { data = MATCHUPS[enId][myId]; flipped = true; }

  if (!data) {
    // Generic matchup based on roles
    data = generateGenericMatchup(my, en);
  }

  const ratingText = data.rating === 'favor' ? '优势对线' : data.rating === 'even' ? '均势对线' : '劣势对线';
  const ratingCls = data.rating === 'favor' ? 'rating-favor' : data.rating === 'even' ? 'rating-even' : 'rating-hard';
  const tipsHtml = data.tips.map(t => `<div class="matchup-tip">${t}</div>`).join('');

  document.getElementById('matchup-output').innerHTML = `
    <div class="matchup-result">
      <div class="matchup-header">
        <div class="matchup-vs-row">
          <div class="matchup-champ">
            <img class="matchup-champ-img" src="${getImgUrl(my.id)}" alt="${my.name_cn}"
                 onerror="this.style.background='linear-gradient(135deg,${my.colors[0]},${my.colors[1]});display:block'">
            <div class="matchup-champ-name">${my.name_cn}</div>
          </div>
          <div class="matchup-rating">
            <div class="rating-badge ${ratingCls}">${ratingText}</div>
            <div class="rating-sub">${my.name_cn} vs ${en.name_cn}</div>
          </div>
          <div class="matchup-champ">
            <img class="matchup-champ-img" src="${getImgUrl(en.id)}" alt="${en.name_cn}"
                 onerror="this.style.background='linear-gradient(135deg,${en.colors[0]},${en.colors[1]});display:block'">
            <div class="matchup-champ-name">${en.name_cn}</div>
          </div>
        </div>
      </div>
      <div class="matchup-body">
        <div class="section-label">对线要点</div>
        ${tipsHtml}
      </div>
    </div>
  `;
}

function generateGenericMatchup(my, en) {
  // Simple heuristic
  const assassins = ['刺客'];
  const squishies = ['法师','射手','辅助'];

  if (assassins.includes(en.role) && squishies.includes(my.role)) {
    return {rating:'hard', tips:[
      `${en.name_cn}是刺客，注意他的突进节奏，不要冒进`,
      '贴近队友，不要在前排单独承受突进',
      '开大/控制优先保命，不要和刺客硬拼单杀',
      '血量不满就撤退，不要在被刺客盯上时贪念输出',
    ]};
  }
  if (squishies.includes(en.role) && assassins.includes(my.role)) {
    return {rating:'favor', tips:[
      `${en.name_cn}较脆，把握突进时机一套带走`,
      '等队友控制或对方CD用完后出手',
      '快速解决目标后撤退，不要在人群里硬耗',
      '对方血量不满时出手，一套带走更稳',
    ]};
  }
  return {rating:'even', tips:[
    '均势对线，发挥各自技能优势',
    '注意走位，避免被对方技能命中',
    '配合队友打出控制链，不要单独行动',
    '大乱斗中注意观察对方技能CD',
  ]};
}

/* ═══════════════════════════════════════
   AUGMENTS
═══════════════════════════════════════ */
function renderAugments() {
  const id = document.getElementById('aug-champ-select').value;
  if (!id) {
    document.getElementById('augment-output').innerHTML = `<div class="select-prompt"><div class="pi">💎</div><div>选择英雄后查看推荐海克斯强化</div></div>`;
    return;
  }
  const c = CHAMPS.find(x => x.id === id);
  const augs = c.augments;

  document.getElementById('augment-output').innerHTML = `
    <div class="aug-context">当前英雄：<span>${c.name_cn}</span> 的推荐海克斯强化</div>
    <div style="height:12px"></div>
    <div class="aug-grid">
      ${augs.map(a => `
        <div class="aug-card">
          <div class="aug-tier-bar ${a.tier}"></div>
          <div class="aug-inner">
            <div class="aug-top">
              <div class="aug-tier-badge ${a.tier}">${a.tier}</div>
              <div class="aug-name">${a.name}</div>
              <div class="aug-hex-icon" style="background:linear-gradient(135deg,${c.colors[0]}33,${c.colors[1]}33)">${a.icon}</div>
            </div>
            <div class="aug-reason">${a.reason}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

init();
</script>
</body>
</html>
