<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>悦行管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:999}
.lock-box{background:#fff;border-radius:20px;padding:36px 28px;width:90%;max-width:340px;text-align:center}
.lock-box .ico{font-size:52px;margin-bottom:12px}
.lock-box h2{font-size:20px;margin-bottom:6px}
.lock-box p{font-size:13px;color:#888;margin-bottom:24px}
.lock-input{width:100%;height:48px;border:1.5px solid #eee;border-radius:12px;padding:0 16px;font-size:16px;outline:none;text-align:center;letter-spacing:6px;margin-bottom:16px;transition:.2s}
.lock-input:focus{border-color:#FF6B35}
.lock-btn{width:100%;height:48px;background:linear-gradient(135deg,#FF6B35,#e85d26);color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:600;cursor:pointer}
#admin-wrap{display:none;width:100%}
.top-bar{background:linear-gradient(135deg,#2D3436,#1a1a2e);padding:48px 20px 20px;color:#fff}
.top-bar h2{font-size:20px;font-weight:700}
.top-bar p{font-size:12px;opacity:0.6;margin-top:4px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.stat-card{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-card .v{font-size:28px;font-weight:700;color:#FF6B35;line-height:1.2}
.stat-card .l{font-size:11px;color:#999;margin-top:6px}
.diff{font-size:11px;margin-top:4px}
.diff.up{color:#27ae60}
.diff.down{color:#e74c3c}
.section{background:#fff;margin:0 16px 14px;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sec-hd{padding:14px 16px;font-size:15px;font-weight:600;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center}
.badge{background:#FF6B35;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.order-row{padding:12px 16px;border-bottom:1px solid #f9f9f9;display:flex;justify-content:space-between;align-items:flex-start}
.order-row:last-child{border-bottom:none}
.order-left .name{font-size:14px;font-weight:500}
.order-left .meta{font-size:11px;color:#999;margin-top:3px;line-height:1.6}
.order-right{text-align:right;flex-shrink:0;margin-left:10px}
.fee{font-size:15px;font-weight:700;color:#FF6B35}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.ts{background:#e8f8ef;color:#27ae60}
.tw{background:#fff3e0;color:#e67e22}
.td{background:#fdecea;color:#e74c3c}
.ti{background:#e8f4fd;color:#2980b9}
.action-btn{margin-top:6px;padding:4px 12px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;background:#e8f8ef;color:#27ae60}
.dev-row{padding:12px 16px;border-bottom:1px solid #f9f9f9;display:flex;justify-content:space-between;align-items:center}
.dev-row:last-child{border-bottom:none}
.dev-name{font-size:14px;font-weight:500}
.dev-meta{font-size:11px;color:#999;margin-top:3px}
.batt-bar{height:4px;background:#eee;border-radius:2px;margin-top:6px;width:80px}
.batt-fill{height:100%;border-radius:2px}
.week-chart{padding:16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-label{font-size:12px;color:#888;width:24px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:#f5f5f5;border-radius:4px;overflow:hidden}
.bar-fill-chart{height:100%;border-radius:4px;background:linear-gradient(90deg,#FF6B35,#e85d26);display:flex;align-items:center;padding-left:6px;min-width:4px}
.bar-fill-chart span{font-size:11px;color:#fff;font-weight:500}
.empty{padding:24px;text-align:center;color:#bbb;font-size:13px}
.tab-row{display:flex;border-bottom:1px solid #f0f0f0}
.tab-btn{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.tab-btn.on{color:#FF6B35;border-bottom-color:#FF6B35;font-weight:600}
.logout-btn{margin:0 16px 32px;width:calc(100% - 32px);height:44px;background:#fff;color:#e74c3c;border:1.5px solid #fdecea;border-radius:22px;font-size:14px;cursor:pointer;font-weight:500;display:block}
</style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-box">
    <div class="ico">🔐</div>
    <h2>悦行管理后台</h2>
    <p>仅限管理员访问</p>
    <input class="lock-input" type="password" id="pwd" placeholder="输入密码" onkeydown="if(event.key==='Enter')login()">
    <button class="lock-btn" onclick="login()">进入后台</button>
  </div>
</div>

<div id="admin-wrap">
  <div class="top-bar">
    <h2>🔧 悦行管理后台</h2>
    <p id="admin-date"></p>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="v" id="s-today">0</div><div class="l">今日订单</div><div class="diff" id="s-diff"></div></div>
    <div class="stat-card"><div class="v" id="s-active" style="color:#27ae60">0</div><div class="l">当前租赁中</div></div>
    <div class="stat-card"><div class="v" id="s-income">¥0</div><div class="l">今日收入</div></div>
    <div class="stat-card"><div class="v" id="s-total">¥0</div><div class="l">累计收入</div></div>
  </div>
  <div class="section">
    <div class="sec-hd">📊 近7天订单 <span id="week-total" style="font-size:12px;color:#999;font-weight:400"></span></div>
    <div class="week-chart" id="week-chart"></div>
  </div>
  <div class="section">
    <div class="sec-hd">📋 订单列表 <span class="badge" id="order-badge">0</span></div>
    <div class="tab-row">
      <div class="tab-btn on" onclick="switchTab('all',this)">全部</div>
      <div class="tab-btn" onclick="switchTab('active',this)">租赁中</div>
      <div class="tab-btn" onclick="switchTab('completed',this)">已完成</div>
    </div>
    <div id="order-list"></div>
  </div>
  <div class="section">
    <div class="sec-hd">🧳 设备状态</div>
    <div id="device-list"></div>
  </div>
  <button class="logout-btn" onclick="location.reload()">退出后台</button>
</div>

<script>
const PWD='hu5471327';
const DEVICES=[
  {id:'BOX-001',name:'电动行李箱A1',model:'标准版',battery:98,location:'植物园东门'},
  {id:'BOX-002',name:'电动行李箱A2',model:'标准版',battery:97,location:'植物园东门'},
  {id:'BOX-003',name:'电动行李箱B1',model:'加强版',battery:96,location:'植物园西门'},
  {id:'BOX-004',name:'电动行李箱B2',model:'加强版',battery:99,location:'植物园北门'},
];
const OS={active:'租赁中',completed:'已完成',overdue:'已逾期',pending:'待支付',cancelled:'已取消',returned:'待结算'};
const OC={active:'ts',completed:'ti',overdue:'td',pending:'tw',cancelled:'ti',returned:'tw'};
let allOrders=[],curTab='all';

function login(){
  if(document.getElementById('pwd').value===PWD){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('admin-wrap').style.display='block';
    initAdmin();
  }else{alert('密码错误');document.getElementById('pwd').value='';}
}

function initAdmin(){
  const d=new Date();
  document.getElementById('admin-date').textContent=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  allOrders=JSON.parse(localStorage.getItem('ywx_orders')||'[]');
  const todayStr=d.toDateString();
  const yest=new Date(d-86400000).toDateString();
  const todayOrders=allOrders.filter(o=>new Date(o.startAt).toDateString()===todayStr);
  const yesterdayOrders=allOrders.filter(o=>new Date(o.startAt).toDateString()===yest);
  const active=allOrders.filter(o=>o.status==='active');
  const todayIncome=allOrders.filter(o=>o.status==='completed'&&new Date(o.endAt||o.startAt).toDateString()===todayStr).reduce((s,o)=>s+(o.fee||0),0);
  const total=allOrders.filter(o=>o.status==='completed').reduce((s,o)=>s+(o.fee||0),0);
  document.getElementById('s-today').textContent=todayOrders.length;
  document.getElementById('s-active').textContent=active.length;
  document.getElementById('s-income').textContent='¥'+todayIncome;
  document.getElementById('s-total').textContent='¥'+total;
  document.getElementById('order-badge').textContent=allOrders.length;
  const diff=todayOrders.length-yesterdayOrders.length;
  const de=document.getElementById('s-diff');
  if(diff>0){de.textContent='↑ 比昨天多'+diff+'单';de.className='diff up';}
  else if(diff<0){de.textContent='↓ 比昨天少'+Math.abs(diff)+'单';de.className='diff down';}
  else{de.textContent='与昨天持平';de.className='diff';}
  renderWeek();renderOrders(allOrders);renderDevices(active.map(o=>o.deviceId));
}

function renderWeek(){
  const days=[];
  for(let i=6;i>=0;i--){
    const dd=new Date(Date.now()-i*86400000);
    const cnt=allOrders.filter(o=>new Date(o.startAt).toDateString()===dd.toDateString()).length;
    days.push({label:['日','一','二','三','四','五','六'][dd.getDay()],cnt});
  }
  const max=Math.max(...days.map(d=>d.cnt),1);
  document.getElementById('week-chart').innerHTML=days.map(d=>`
    <div class="bar-row">
      <span class="bar-label">${d.label}</span>
      <div class="bar-track"><div class="bar-fill-chart" style="width:${Math.max(d.cnt/max*100,d.cnt?4:0)}%">${d.cnt>0?'<span>'+d.cnt+'</span>':''}</div></div>
    </div>`).join('');
  document.getElementById('week-total').textContent='共'+days.reduce((s,d)=>s+d.cnt,0)+'单';
}

function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderOrders(tab==='all'?allOrders:allOrders.filter(o=>o.status===tab));
}

function renderOrders(orders){
  const el=document.getElementById('order-list');
  if(!orders.length){el.innerHTML='<div class="empty">暂无订单</div>';return;}
  el.innerHTML=[...orders].reverse().map(o=>{
    const start=new Date(o.startAt).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const dur=o.endAt?Math.round((o.endAt-o.startAt)/3600000*10)/10+'小时':'进行中';
    return `<div class="order-row">
      <div class="order-left">
        <div class="name">${o.deviceName||o.deviceId}</div>
        <div class="meta">开始：${start} · 时长：${dur}<br>${o.plan==='hourly'?'时租':'日封顶'} · 押金¥${o.deposit||500}</div>
        ${o.status==='active'?`<button class="action-btn" onclick="markReturn('${o.id}')">✓ 确认归还</button>`:''}
      </div>
      <div class="order-right">
        <span class="tag ${OC[o.status]||'ti'}">${OS[o.status]||o.status}</span>
        <div class="fee">¥${o.fee||0}</div>
      </div>
    </div>`;
  }).join('');
}

function markReturn(id){
  if(!confirm('确认该设备已归还并完成结算？'))return;
  const orders=JSON.parse(localStorage.getItem('ywx_orders')||'[]');
  const idx=orders.findIndex(o=>o.id===id);
  if(idx>-1){
    orders[idx].status='completed';
    orders[idx].endAt=Date.now();
    localStorage.setItem('ywx_orders',JSON.stringify(orders));
    allOrders=orders;
    const active=orders.filter(o=>o.status==='active');
    document.getElementById('s-active').textContent=active.length;
    renderOrders(curTab==='all'?allOrders:allOrders.filter(o=>o.status===curTab));
    renderDevices(active.map(o=>o.deviceId));
    alert('✅ 已确认归还');
  }
}

function renderDevices(activeIds){
  document.getElementById('device-list').innerHTML=DEVICES.map(d=>{
    const rented=activeIds.includes(d.id);
    const color=d.battery>50?'#27ae60':d.battery>20?'#f39c12':'#e74c3c';
    return `<div class="dev-row">
      <div>
        <div class="dev-name">${d.name}</div>
        <div class="dev-meta">📍${d.location} · ${d.model}</div>
        <div class="batt-bar"><div class="batt-fill" style="width:${d.battery*0.8}px;background:${color}"></div></div>
      </div>
      <div style="text-align:right">
        <span class="tag ${rented?'tw':'ts'}">${rented?'租赁中':'可用'}</span>
        <div style="font-size:12px;color:#999;margin-top:4px">🔋${d.battery}%</div>
      </div>
    </div>`;
  }).join('');
}
</script>
</body></html>
