<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID 足迹查询</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090f1a;
  --bg2: #0e1726;
  --bg3: #131f30;
  --border: #1e3050;
  --teal: #00d4aa;
  --teal2: #00ffcc;
  --blue: #4a9eff;
  --red: #ff4757;
  --yellow: #ffd32a;
  --gray: #4a6080;
  --text: #c8d8e8;
  --text2: #6a8aaa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
}

/* scan line effect */
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,170,0.015) 2px, rgba(0,212,170,0.015) 4px);
  pointer-events:none; z-index:0;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 20px 16px;
  text-align: center;
  position: relative; z-index:1;
  background: linear-gradient(180deg, rgba(0,212,170,0.06) 0%, transparent 100%);
}
.header-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--teal);
  border: 1px solid rgba(0,212,170,0.3);
  padding: 3px 10px; border-radius: 3px;
  letter-spacing: 2px; margin-bottom: 12px;
}
.header h1 {
  font-size: 26px; font-weight: 700;
  color: #fff; letter-spacing: 2px;
  margin-bottom: 6px;
}
.header h1 span { color: var(--teal); }
.header p { font-size: 12px; color: var(--text2); letter-spacing: 1px; }

/* ── Search ── */
.search-section {
  max-width: 640px; margin: 24px auto; padding: 0 16px;
  position: relative; z-index:1;
}
.search-box-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 40px rgba(0,212,170,0.06);
}
.input-row {
  display: flex; gap: 10px;
}
.id-input {
  flex: 1; height: 46px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 0 16px;
  color: #fff; font-size: 15px;
  font-family: 'JetBrains Mono', monospace;
  outline: none; transition: .2s;
}
.id-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
.id-input::placeholder { color: var(--gray); }
.search-btn {
  height: 46px; padding: 0 22px;
  background: var(--teal); color: #000;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  font-family: 'Noto Sans SC', sans-serif;
  transition: .2s;
}
.search-btn:hover { background: var(--teal2); }
.search-btn:disabled { opacity: .5; cursor: not-allowed; }

.hint-text {
  margin-top: 10px;
  font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}
.hint-text::before { content: 'ℹ'; color: var(--teal); }

/* ── Stats bar ── */
.stats-bar {
  display: flex; gap: 16px; margin-top: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.stat { display: flex; align-items: center; gap: 5px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-dot.found { background: var(--teal); box-shadow: 0 0 6px var(--teal); }
.stat-dot.notfound { background: var(--gray); }
.stat-dot.checking { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.stat-label { color: var(--text2); }
.stat-num { color: #fff; font-weight:600; }

/* ── Progress ── */
.progress-wrap {
  margin-top: 14px; display: none;
}
.progress-bar {
  height: 3px; background: var(--bg3); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--teal), var(--blue));
  border-radius: 3px; transition: width .3s;
}
.progress-label {
  font-size: 10px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 6px;
  display: flex; justify-content: space-between;
}

/* ── Results ── */
.results-section {
  max-width: 900px; margin: 0 auto; padding: 0 16px 60px;
  position: relative; z-index:1;
}

.category-block { margin-bottom: 24px; }
.category-title {
  font-size: 11px; font-weight: 700; letter-spacing: 3px;
  color: var(--teal); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase;
}
.category-title::after { content:''; flex:1; height:1px; background: var(--border); }

.platform-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
@media(min-width: 540px){ .platform-grid { grid-template-columns: repeat(3, 1fr); } }
@media(min-width: 768px){ .platform-grid { grid-template-columns: repeat(4, 1fr); } }

.platform-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; text-decoration: none;
  transition: .2s; position: relative; overflow: hidden;
}
.platform-card::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, var(--teal), transparent);
  opacity:0; transition:.2s;
}
.platform-card:hover::before { opacity:.05; }
.platform-card:hover { border-color: rgba(0,212,170,0.4); }

.platform-card.found {
  border-color: rgba(0,212,170,0.5);
  background: rgba(0,212,170,0.06);
}
.platform-card.found::after {
  content:'✓';
  position:absolute; top:6px; right:8px;
  font-size:10px; color: var(--teal); font-weight:700;
}
.platform-card.not-found {
  opacity: .45;
}
.platform-card.checking {
  border-color: rgba(255,211,42,0.3);
}

.platform-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  background: var(--bg3);
}
.platform-info { flex:1; min-width:0; }
.platform-name {
  font-size: 13px; font-weight: 500; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.platform-status {
  font-size: 10px; margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
}
.platform-status.found { color: var(--teal); }
.platform-status.not-found { color: var(--gray); }
.platform-status.checking { color: var(--yellow); }
.platform-status.manual { color: var(--blue); }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text2);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
.empty-title { font-size: 16px; color: var(--text); margin-bottom: 8px; }
.empty-sub { font-size: 12px; }

/* ── Export ── */
.export-btn {
  display: none;
  margin: 0 auto 20px;
  padding: 10px 24px;
  background: transparent; border: 1px solid var(--teal);
  color: var(--teal); border-radius: 8px;
  font-size: 13px; cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: .2s;
}
.export-btn:hover { background: rgba(0,212,170,0.1); }
.export-wrap { text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">OSINT · ID FOOTPRINT</div>
  <h1>ID <span>足迹</span>查询</h1>
  <p>输入用户名 · 自动检测 60+ 中国及国际平台的公开账号</p>
</div>

<div class="search-section">
  <div class="search-box-wrap">
    <div class="input-row">
      <input class="id-input" id="id-input" placeholder="输入用户名 / ID..." maxlength="50"

    </div>
    <div class="hint-text">仅查询各平台公开可访问的主页，不获取任何私密信息</div>

    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat">
        <div class="stat-dot found"></div>
        <span class="stat-label">发现</span>
        <span class="stat-num" id="stat-found">0</span>
      </div>
      <div class="stat">
        <div class="stat-dot notfound"></div>
        <span class="stat-label">未找到</span>
        <span class="stat-num" id="stat-notfound">0</span>
      </div>
      <div class="stat">
        <div class="stat-dot checking"></div>
        <span class="stat-label">检测中</span>
        <span class="stat-num" id="stat-checking">0</span>
      </div>
      <div class="stat" style="margin-left:auto">
        <span class="stat-label">平台总数</span>
        <span class="stat-num" id="stat-total">0</span>
      </div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label">
        <span id="progress-text">准备中...</span>
        <span id="progress-pct">0%</span>
      </div>
    </div>
  </div>
</div>

<div class="results-section" id="results-section">
  <div class="empty-state">
    <div class="empty-icon">🔭</div>
    <div class="empty-title">输入用户名开始查询</div>
    <div class="empty-sub">将在60+平台同步检测该ID的公开账号</div>
  </div>
</div>

<div class="export-wrap">
  <button class="export-btn" id="export-btn" onclick="exportResults()">📋 导出找到的结果</button>
</div>

<script>

══════════════════════════════════════ */
const PLATFORMS = [

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let results = {};
let searchUsername = '';
let totalDone = 0;

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
function startSearch() {
  const input = document.getElementById('id-input').value.trim();
  if (!input) return;
  searchUsername = input;
  results = {};
  totalDone = 0;

  document.getElementById('search-btn').disabled = true;
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('export-btn').style.display = 'none';

  updateStats();
  renderResults();

  // For img-probe platforms, try to detect via image loading
  const imgProbes = PLATFORMS.filter(p => p.method === 'img' && p.probe);
  imgProbes.forEach(p => {
    checkPlatformImg(p);
  });

  // Simulate progress for link-only platforms (manual check)
  let i = 0;
  const linkPlatforms = PLATFORMS.filter(p => p.method === 'link');
  const total = PLATFORMS.length;

  function tick() {
    if (i < linkPlatforms.length) {
      const p = linkPlatforms[i];
      results[p.name] = 'manual';
      totalDone++;
      i++;
      updateStats();
      updateProgress(totalDone, total);
      updateCard(p.name, 'manual');
      setTimeout(tick, 30);
    } else {
      finishSearch();
    }
  }
  tick();
}

function checkPlatformImg(platform) {
  const url = platform.probe(searchUsername);
  const img = new Image();
  img.onload = () => {
    results[platform.name] = 'found';
    updateCard(platform.name, 'found');
    updateStats();
    totalDone++;
    updateProgress(totalDone, PLATFORMS.length);
  };
  img.onerror = () => {
    results[platform.name] = 'not-found';
    updateCard(platform.name, 'not-found');
    updateStats();
    totalDone++;
    updateProgress(totalDone, PLATFORMS.length);
  };
  img.src = url + '?_=' + Date.now();
}

function finishSearch() {
  document.getElementById('search-btn').disabled = false;
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = `查询完成 · ${PLATFORMS.length} 个平台`;
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('export-btn').style.display = 'inline-block';
}

function updateProgress(done, total) {
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-text').textContent = `正在检测: ${done} / ${total} 平台`;
}

function updateStats() {
  const found = Object.values(results).filter(v => v === 'found').length;
  const notFound = Object.values(results).filter(v => v === 'not-found').length;
  const checking = PLATFORMS.length - Object.keys(results).length;
  document.getElementById('stat-found').textContent = found;
  document.getElementById('stat-notfound').textContent = notFound;
  document.getElementById('stat-checking').textContent = Math.max(0, checking);
  document.getElementById('stat-total').textContent = PLATFORMS.length;
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderResults() {
  const section = document.getElementById('results-section');
  const u = searchUsername;

  // Group by category
  const cats = {};
  PLATFORMS.forEach(p => {
    if (!cats[p.cat]) cats[p.cat] = [];
    cats[p.cat].push(p);
  });

  section.innerHTML = Object.entries(cats).map(([cat, platforms]) => `
    <div class="category-block">
      <div class="category-title">${cat}</div>
      <div class="platform-grid">
        ${platforms.map(p => renderCard(p, u)).join('')}
      </div>
    </div>
  `).join('');
}

function renderCard(p, u) {
  const status = results[p.name] || 'checking';
  const url = p.url(u);
  const statusText = {
    'found': '✓ 账号已找到',
    'not-found': '未找到账号',
    'checking': '检测中...',
    'manual': '点击验证',
  }[status];
  return `
    <a class="platform-card ${status}" href="${url}" target="_blank" rel="noopener"
       id="card-${sanitizeId(p.name)}" title="${p.name}: ${url}">
      <div class="platform-icon">${p.icon}</div>
      <div class="platform-info">
        <div class="platform-name">${p.name}</div>
        <div class="platform-status ${status}">${statusText}</div>
      </div>
    </a>
  `;
}

function updateCard(name, status) {
  const card = document.getElementById('card-' + sanitizeId(name));
  if (!card) return;
  card.className = 'platform-card ' + status;
  const statusEl = card.querySelector('.platform-status');
  const statusText = {
    'found': '✓ 账号已找到',
    'not-found': '未找到账号',
    'checking': '检测中...',
    'manual': '点击验证',
  }[status];
  if (statusEl) {
    statusEl.className = 'platform-status ' + status;
    statusEl.textContent = statusText;
  }
}

function sanitizeId(name) {
  return name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
}

/* ══════════════════════════════════════
   EXPORT
══════════════════════════════════════ */
function exportResults() {
  const u = searchUsername;
  const lines = [`ID足迹查询报告`, `查询用户名: ${u}`, `查询时间: ${new Date().toLocaleString()}`, `平台总数: ${PLATFORMS.length}`, '', '--- 检测结果 ---', ''];

  const found = PLATFORMS.filter(p => results[p.name] === 'found');
  const manual = PLATFORMS.filter(p => results[p.name] === 'manual');

  if (found.length) {
    lines.push('【自动确认找到】');
    found.forEach(p => lines.push(`  ✓ ${p.name}: ${p.url(u)}`));
    lines.push('');
  }

  lines.push('【需手动验证 - 点击链接确认】');
  manual.forEach(p => lines.push(`  → ${p.name}: ${p.url(u)}`));

  const blob = new Blob([lines.join('\n')], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ID足迹_${u}_${Date.now()}.txt`;
  a.click();
}
</script>
