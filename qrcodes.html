<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>悦行 - 设备贴纸</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #e0e0e0;
    padding: 30px;
  }

  .no-print {
    text-align: center;
    margin-bottom: 24px;
  }
  .no-print button {
    background: #FF6B35;
    color: #fff;
    border: none;
    padding: 12px 36px;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin: 0 6px;
  }
  .no-print p {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
  }

  /* 4张贴纸一排 */
  .sticker-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    max-width: 760px;
    margin: 0 auto;
  }

  /* 单张贴纸 */
  .sticker {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #fff;
    border-radius: 20px;
    border: 3px dashed #ccc;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    page-break-inside: avoid;
  }

  /* 顶部色块 */
  .sticker-top {
    width: 100%;
    background: linear-gradient(135deg, #FF6B35 0%, #FF4500 100%);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sticker-brand {
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 6px;
  }

  .sticker-device-id {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.2);
    padding: 4px 10px;
    border-radius: 10px;
    letter-spacing: 1px;
  }

  /* 二维码区 */
  .sticker-qr {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .sticker-qr > div {
    border: none !important;
  }
  .sticker-qr img,
  .sticker-qr canvas {
    border-radius: 8px;
  }

  /* 底部信息 */
  .sticker-bottom {
    width: 100%;
    background: #f8f8f8;
    border-top: 2px solid #FF6B35;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }

  .sticker-name {
    font-size: 16px;
    font-weight: 900;
    color: #2D3436;
    letter-spacing: 1px;
  }

  .sticker-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sticker-location {
    font-size: 12px;
    color: #636e72;
    letter-spacing: 0.5px;
  }

  .sticker-tip {
    font-size: 11px;
    color: #FF6B35;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .sticker-scan-hint {
    text-align: center;
    font-size: 11px;
    color: #b2bec3;
    padding: 0 0 8px;
    letter-spacing: 1px;
  }

  /* 角标装饰 */
  .corner-dot {
    position: absolute;
    width: 10px; height: 10px;
    background: #FF6B35;
    border-radius: 50%;
  }
  .corner-dot.tl { top: -1px; left: -1px; }
  .corner-dot.tr { top: -1px; right: -1px; }
  .corner-dot.bl { bottom: -1px; left: -1px; }
  .corner-dot.br { bottom: -1px; right: -1px; }

  @media print {
    body { background: #fff; padding: 10px; }
    .no-print { display: none !important; }
    .sticker-grid { gap: 16px; max-width: 100%; }
    .sticker { border: 2px dashed #bbb; border-radius: 16px; }
  }
</style>
</head>
<body>

<div class="no-print">
  <button onclick="window.print()">🖨️ 打印贴纸</button>
  <p>打印后沿虚线裁剪，贴在对应设备上 · 建议打印 A4 纸</p>
</div>

<div class="sticker-grid" id="sticker-grid"></div>

<script>
const devices = [
  { id: 'BOX-001', name: '电动行李箱 A1', model: '标准版 · 12kg', location: '📍 植物园东门' },
  { id: 'BOX-002', name: '电动行李箱 A2', model: '标准版 · 12kg', location: '📍 植物园东门' },
  { id: 'BOX-003', name: '电动行李箱 B1', model: '加强版 · 14kg', location: '📍 植物园西门' },
  { id: 'BOX-004', name: '电动行李箱 B2', model: '加强版 · 14kg', location: '📍 植物园北门' },
];

const grid = document.getElementById('sticker-grid');

devices.forEach(d => {
  const sticker = document.createElement('div');
  sticker.className = 'sticker';
  sticker.innerHTML = `
    <div class="corner-dot tl"></div>
    <div class="corner-dot tr"></div>
    <div class="corner-dot bl"></div>
    <div class="corner-dot br"></div>
    <div class="sticker-top">
      <span class="sticker-brand">悦 行</span>
      <span class="sticker-device-id">${d.id}</span>
    </div>
    <div class="sticker-qr" id="qr-${d.id}"></div>
    <div class="sticker-scan-hint">扫描二维码 · 立即租借</div>
    <div class="sticker-bottom">
      <div class="sticker-name">${d.name}</div>
      <div class="sticker-meta">
        <span class="sticker-location">${d.location} · ${d.model}</span>
        <span class="sticker-tip">¥19/小时</span>
      </div>
    </div>
  `;
  grid.appendChild(sticker);

  setTimeout(() => {
    const container = document.getElementById('qr-' + d.id);
    const size = Math.min(container.offsetWidth, container.offsetHeight) - 32;
    new QRCode(container, {
      text: 'https://zuxiang.xyz/?device=' + d.id,
      width: size || 180,
      height: size || 180,
      colorDark: '#1a1a1a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }, 200);
});
</script>
</body>
</html>
