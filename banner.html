<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>悦行 — 易拉宝</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #aaa;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .no-print {
    margin-bottom: 20px;
  }
  .no-print button {
    background: #333;
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ── 整体海报 ── */
  .banner {
    width: 680px;
    background: #B8E8FF;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    padding-bottom: 40px;
  }

  /* 左侧竖排小字 */
  .side-text {
    position: absolute;
    left: 18px;
    top: 100px;
    writing-mode: vertical-rl;
    font-size: 15px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 6px;
    background: #FF6B00;
    padding: 12px 6px;
    border-radius: 4px;
    z-index: 10;
  }

  /* ── 主标题区 ── */
  .headline {
    padding: 44px 60px 0 60px;
    line-height: 1;
  }

  .hl1 {
    display: block;
    font-size: 118px;
    font-weight: 900;
    color: #FFE600;
    -webkit-text-stroke: 5px #FF4500;
    letter-spacing: 2px;
    line-height: 1.0;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.15);
  }

  .hl2 {
    display: block;
    font-size: 118px;
    font-weight: 900;
    color: #FFE600;
    -webkit-text-stroke: 5px #FF4500;
    letter-spacing: 2px;
    line-height: 1.0;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.15);
  }

  /* ── 产品标签 ── */
  .product-tag {
    margin: 20px 60px 0;
    display: inline-block;
    background: #FF3399;
    color: #fff;
    font-size: 26px;
    font-weight: 900;
    padding: 10px 30px;
    border-radius: 50px;
    letter-spacing: 3px;
  }

  /* ── 产品图 ── */
  .product-area {
    margin: 14px 0 0;
    width: 100%;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .product-area img.product-photo {
    height: 300px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(6px 12px 18px rgba(0,0,0,0.25));
    z-index: 2;
    position: relative;
  }

  .product-fallback {
    font-size: 200px;
    line-height: 1;
    filter: drop-shadow(6px 12px 18px rgba(0,0,0,0.2));
    z-index: 2;
    position: relative;
  }

  /* 装饰圆 */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .dc1 { width: 280px; height: 280px; top: 20px; right: 30px; }
  .dc2 { width: 180px; height: 180px; top: 80px; left: 80px; }

  /* ── 价格区 ── */
  .price-area {
    margin: 16px 50px 0;
    background: rgba(255,255,255,0.55);
    border-radius: 16px;
    padding: 20px 30px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .price-main {
    flex: 1;
  }

  .price-only {
    font-size: 22px;
    font-weight: 900;
    color: #333;
    letter-spacing: 2px;
  }

  .price-num {
    font-size: 86px;
    font-weight: 900;
    color: #FF2200;
    line-height: 1;
    letter-spacing: -2px;
  }

  .price-num sup {
    font-size: 38px;
    vertical-align: super;
    letter-spacing: 0;
  }

  .price-unit {
    font-size: 22px;
    font-weight: 900;
    color: #333;
    display: inline;
    letter-spacing: 1px;
  }

  .price-day {
    font-size: 30px;
    font-weight: 900;
    color: #333;
    letter-spacing: 1px;
    margin-top: 6px;
  }

  .price-day span {
    color: #FF2200;
    font-size: 38px;
  }

  .price-divider {
    width: 2px;
    height: 90px;
    background: rgba(0,0,0,0.15);
    margin: 0 24px;
  }

  .price-side {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }

  .price-side .item {
    font-size: 17px;
    font-weight: 900;
    color: #444;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .price-side .item::before {
    content: '✓';
    color: #FF2200;
    font-size: 20px;
  }

  /* ── 底部区：二维码 + 电话 ── */
  .bottom-area {
    margin: 20px 50px 0;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .wechat-qr {
    flex-shrink: 0;
    background: #fff;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .wechat-qr img {
    width: 140px;
    height: 140px;
    object-fit: cover;
    border-radius: 6px;
    display: block;
  }

  .wechat-qr .wq-label {
    font-size: 14px;
    font-weight: 900;
    color: #07C160;
    letter-spacing: 1px;
  }

  .contact-info {
    flex: 1;
  }

  .contact-info .c-label {
    font-size: 18px;
    font-weight: 900;
    color: #555;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .contact-info .c-phone {
    font-size: 40px;
    font-weight: 900;
    color: #FF2200;
    letter-spacing: 2px;
    line-height: 1;
  }

  .contact-info .c-tip {
    font-size: 14px;
    color: #888;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .contact-info .c-deposit {
    margin-top: 12px;
    font-size: 16px;
    font-weight: 900;
    color: #555;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.6);
    padding: 8px 14px;
    border-radius: 8px;
    display: inline-block;
  }

  @media print {
    body { background: white; padding: 0; }
    .no-print { display: none !important; }
    .banner { box-shadow: none; width: 100%; }
  }
</style>
</head>
<body>

<div class="no-print">
  <button onclick="window.print()">🖨️ 打印</button>
</div>

<div class="banner">

  <!-- 左侧竖排 -->
  <div class="side-text">悦行租箱</div>

  <!-- 主标题 -->
  <div class="headline">
    <span class="hl1">出门游玩</span>
    <span class="hl2">何必走路？</span>
  </div>

  <!-- 产品标签 -->
  <div style="padding: 0 60px; margin-top: 20px;">
    <span class="product-tag">智能电动行李箱租借</span>
  </div>

  <!-- 产品图 -->
  <div class="product-area">
    <div class="deco-circle dc1"></div>
    <div class="deco-circle dc2"></div>
    <img src="product.jpg" class="product-photo" alt=""
         onerror="this.style.display='none';document.getElementById('pf').style.display='block'">
    <div class="product-fallback" id="pf" style="display:none">🧳</div>
  </div>

  <!-- 价格 -->
  <div class="price-area">
    <div class="price-main">
      <div class="price-only">只需</div>
      <div>
        <span class="price-num"><sup>¥</sup>19</span>
        <span class="price-unit">/小时</span>
      </div>
      <div class="price-day">全天封顶 <span>¥78</span>/天</div>
    </div>
    <div class="price-divider"></div>
    <div class="price-side">
      <div class="item">扫码即用，无需排队</div>
      <div class="item">免费更换电池</div>
      <div class="item">归还设备押金秒退</div>
      <div class="item">东门西门北门均可还</div>
    </div>
  </div>

  <!-- 底部：微信二维码 + 电话 -->
  <div class="bottom-area">
    <div class="wechat-qr">
      <img src="wechat-friend.jpg" alt="微信好友二维码">
      <div class="wq-label">💬 扫码加微信</div>
    </div>
    <div class="contact-info">
      <div class="c-label">📞 客服热线</div>
      <div class="c-phone">18630721779</div>
      <div class="c-tip">随时来电 · 快速响应</div>
      <div class="c-deposit">🔒 押金 ¥500，归还即退</div>
    </div>
  </div>

</div>

</body>
</html>
