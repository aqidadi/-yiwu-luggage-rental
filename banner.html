<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>悦行 — 易拉宝</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .no-print {
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
  }
  .no-print button {
    background: #FF6B35;
    color: #fff;
    border: none;
    padding: 11px 28px;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  /* ─── Banner ─── */
  .banner {
    width: 750px;
    background: #E8F8FF;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  /* wavy top bar */
  .top-bar {
    height: 18px;
    background: repeating-linear-gradient(
      90deg,
      #FF6B35 0px, #FF6B35 30px,
      #FFD700 30px, #FFD700 60px,
      #4FC3F7 60px, #4FC3F7 90px,
      #FF6B35 90px
    );
  }

  /* ─── HEADLINE ─── */
  .headline-block {
    padding: 36px 48px 0;
    text-align: center;
  }

  .headline-line1 {
    font-size: 92px;
    font-weight: 900;
    color: #FFD700;
    line-height: 1;
    letter-spacing: 4px;
    -webkit-text-stroke: 4px #FF4500;
    text-shadow: 6px 6px 0 #FF4500;
    display: block;
  }

  .headline-line2 {
    font-size: 92px;
    font-weight: 900;
    color: #FF4500;
    line-height: 1.05;
    letter-spacing: 4px;
    -webkit-text-stroke: 3px #8B1A00;
    text-shadow: 5px 5px 0 #8B1A00;
    display: block;
  }

  /* ─── SUB TAG ─── */
  .sub-tag {
    margin: 18px auto 0;
    display: inline-block;
    background: #FF4500;
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    padding: 10px 40px;
    border-radius: 50px;
    letter-spacing: 4px;
    box-shadow: 4px 4px 0 #8B1A00;
  }

  /* ─── PRODUCT IMAGE ─── */
  .product-area {
    margin: 20px auto 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 300px;
    position: relative;
  }

  .product-emoji {
    font-size: 220px;
    line-height: 1;
    filter: drop-shadow(8px 16px 20px rgba(0,0,0,0.25));
    user-select: none;
  }

  /* decorative circles */
  .circle1 {
    position: absolute;
    width: 200px; height: 200px;
    background: rgba(255,215,0,0.2);
    border-radius: 50%;
    top: 20px; left: 60px;
  }
  .circle2 {
    position: absolute;
    width: 150px; height: 150px;
    background: rgba(79,195,247,0.25);
    border-radius: 50%;
    top: 60px; right: 80px;
  }

  /* ─── PRICE BLOCK ─── */
  .price-block {
    margin: 10px 40px 0;
    background: #fff;
    border-radius: 24px;
    border: 4px solid #FF4500;
    padding: 28px 40px;
    box-shadow: 6px 6px 0 #FF4500;
    display: flex;
    align-items: center;
    justify-content: space-around;
  }

  .price-item {
    text-align: center;
  }

  .price-item .only {
    font-size: 20px;
    color: #555;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .price-item .amount {
    font-size: 82px;
    font-weight: 900;
    color: #FF4500;
    line-height: 1;
    letter-spacing: -2px;
  }

  .price-item .amount .symbol {
    font-size: 40px;
    vertical-align: super;
  }

  .price-item .unit {
    font-size: 24px;
    color: #333;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .price-divider {
    width: 3px;
    height: 100px;
    background: #eee;
    border-radius: 3px;
  }

  .price-item .cap-label {
    font-size: 16px;
    background: #FFD700;
    color: #8B4513;
    padding: 3px 14px;
    border-radius: 20px;
    font-weight: 900;
    margin-top: 4px;
    display: inline-block;
    letter-spacing: 1px;
  }

  /* ─── FEATURES ─── */
  .features {
    margin: 22px 40px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .feat {
    background: #fff;
    border-radius: 16px;
    border-left: 5px solid #FF6B35;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }

  .feat .icon { font-size: 28px; }
  .feat .text { font-size: 17px; font-weight: 700; color: #2D3436; letter-spacing: 1px; }
  .feat .sub  { font-size: 12px; color: #888; margin-top: 2px; }

  /* ─── QR SECTION ─── */
  .qr-section {
    margin: 24px 40px 0;
    display: flex;
    gap: 20px;
    align-items: stretch;
  }

  .qr-card {
    flex: 1;
    background: #fff;
    border-radius: 20px;
    border: 3px solid #4FC3F7;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 4px 4px 0 #4FC3F7;
  }

  .qr-card.wechat {
    border-color: #07C160;
    box-shadow: 4px 4px 0 #07C160;
  }

  .qr-card .qr-title {
    font-size: 20px;
    font-weight: 900;
    color: #2D3436;
    letter-spacing: 2px;
  }

  .qr-card img {
    width: 170px;
    height: 170px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #eee;
  }

  .qr-card .qr-tip {
    font-size: 14px;
    color: #888;
    letter-spacing: 1px;
    text-align: center;
  }

  /* ─── DEPOSIT ROW ─── */
  .deposit-row {
    margin: 16px 40px 0;
    background: #FFF8E1;
    border: 2px dashed #FFC107;
    border-radius: 14px;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .deposit-row .label { font-size: 18px; color: #666; font-weight: 700; letter-spacing: 2px; }
  .deposit-row .amount { font-size: 26px; font-weight: 900; color: #FF6B35; }
  .deposit-row .note { font-size: 13px; color: #aaa; letter-spacing: 1px; }

  /* ─── CONTACT BAR ─── */
  .contact-bar {
    margin: 18px 40px 0;
    background: #FF4500;
    border-radius: 16px;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .contact-bar .label { font-size: 18px; color: rgba(255,255,255,0.85); letter-spacing: 2px; font-weight: 700; }
  .contact-bar .phone { font-size: 36px; color: #FFD700; font-weight: 900; letter-spacing: 3px; }

  /* ─── BOTTOM TAG ─── */
  .bottom-slogan {
    text-align: center;
    padding: 20px 40px 10px;
    font-size: 20px;
    color: #888;
    letter-spacing: 6px;
    font-weight: 500;
  }

  .bottom-bar {
    height: 18px;
    background: repeating-linear-gradient(
      90deg,
      #FF6B35 0px, #FF6B35 30px,
      #FFD700 30px, #FFD700 60px,
      #4FC3F7 60px, #4FC3F7 90px,
      #FF6B35 90px
    );
    margin-top: 14px;
  }

  @media print {
    body { background: white; padding: 0; }
    .no-print { display: none !important; }
    .banner { box-shadow: none; width: 100%; }
  }
</style>
</head>
<body>

<div class="no-print">
  <button onclick="window.print()">🖨️ 打印广告牌</button>
</div>

<div class="banner">

  <div class="top-bar"></div>

  <!-- 冲击力标题 -->
  <div class="headline-block">
    <span class="headline-line1">拎着箱子</span>
    <span class="headline-line2">何必走路？</span>
    <div style="text-align:center;margin-top:16px;">
      <span class="sub-tag">智能电动行李箱租借</span>
    </div>
  </div>

  <!-- 产品图 -->
  <div class="product-area">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="product-emoji">🧳</div>
  </div>

  <!-- 价格 -->
  <div class="price-block">
    <div class="price-item">
      <div class="only">只需</div>
      <div class="amount"><span class="symbol">¥</span>19</div>
      <div class="unit">/ 小时</div>
    </div>
    <div class="price-divider"></div>
    <div class="price-item">
      <div class="only">全天封顶</div>
      <div class="amount"><span class="symbol">¥</span>78</div>
      <div class="unit">/ 天</div>
      <div class="cap-label">最划算</div>
    </div>
  </div>

  <!-- 押金 -->
  <div class="deposit-row">
    <div>
      <div class="label">押金 ¥500</div>
      <div class="note">归还设备，立即退回</div>
    </div>
    <div style="font-size:28px;">🔒</div>
  </div>

  <!-- 特色 -->
  <div class="features">
    <div class="feat">
      <div class="icon">🔋</div>
      <div>
        <div class="text">免费换电池</div>
        <div class="sub">没电联系客服更换</div>
      </div>
    </div>
    <div class="feat">
      <div class="icon">📱</div>
      <div>
        <div class="text">扫码即租</div>
        <div class="sub">无需排队，即租即走</div>
      </div>
    </div>
    <div class="feat">
      <div class="icon">🎒</div>
      <div>
        <div class="text">解放双手</div>
        <div class="sub">骑着走，不用扛</div>
      </div>
    </div>
    <div class="feat">
      <div class="icon">📍</div>
      <div>
        <div class="text">就近归还</div>
        <div class="sub">东门西门北门均可</div>
      </div>
    </div>
  </div>

  <!-- 二维码区 -->
  <div class="qr-section">
    <div class="qr-card">
      <div class="qr-title">📱 扫码租借</div>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=https://zuxiang.xyz&color=000000&bgcolor=ffffff&margin=6"
           alt="租借二维码"
           onerror="this.src='';this.alt='zuxiang.xyz'">
      <div class="qr-tip">zuxiang.xyz</div>
    </div>
    <div class="qr-card wechat">
      <div class="qr-title">💬 加微信咨询</div>
      <img src="wechat.jpg" alt="微信二维码"
           onerror="this.style.background='#f0f0f0';this.alt='微信二维码'">
      <div class="qr-tip">扫码添加好友</div>
    </div>
  </div>

  <!-- 电话 -->
  <div class="contact-bar">
    <div class="label">📞 客服热线</div>
    <div class="phone">18630721779</div>
  </div>

  <div class="bottom-slogan">悦行 · 出行更悦，游玩无忧</div>

  <div class="bottom-bar"></div>

</div>

</body>
</html>
