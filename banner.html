<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>悦行 — 易拉宝</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .no-print {
    margin-bottom: 20px;
  }
  .no-print button {
    background: #333;
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ── 整体海报 ── */
  .banner {
    width: 700px;
    background: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  /* ── 顶部彩条 ── */
  .stripe {
    height: 22px;
    background: linear-gradient(90deg,
      #FFD700 0%, #FFD700 25%,
      #FF4500 25%, #FF4500 50%,
      #00BFFF 50%, #00BFFF 75%,
      #32CD32 75%, #32CD32 100%
    );
  }

  /* ── 品牌行 ── */
  .brand-row {
    background: #FF4500;
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand-row .name {
    font-size: 32px;
    font-weight: 900;
    color: #FFD700;
    letter-spacing: 8px;
  }
  .brand-row .tag {
    font-size: 16px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 2px;
    font-weight: 900;
  }

  /* ── 主标题 ── */
  .main-title {
    padding: 40px 32px 0;
    line-height: 1.05;
  }

  .title-l1 {
    display: block;
    font-size: 112px;
    font-weight: 900;
    color: #FFD700;
    -webkit-text-stroke: 5px #FF4500;
    letter-spacing: 4px;
    line-height: 1;
  }

  .title-l2 {
    display: block;
    font-size: 112px;
    font-weight: 900;
    color: #FF4500;
    -webkit-text-stroke: 4px #8B0000;
    letter-spacing: 4px;
    line-height: 1.05;
  }

  /* ── 副标题标签 ── */
  .product-label {
    margin: 20px 32px 0;
    display: inline-block;
    background: #FF4500;
    color: #fff;
    font-size: 30px;
    font-weight: 900;
    padding: 10px 36px;
    border-radius: 8px;
    letter-spacing: 4px;
  }

  /* ── 产品图区 ── */
  .product-zone {
    margin: 0 0;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #fff8f0 0%, #fff 100%);
    overflow: hidden;
    position: relative;
  }

  .product-zone .bg-circle {
    position: absolute;
    width: 320px; height: 320px;
    background: rgba(255, 200, 50, 0.12);
    border-radius: 50%;
    top: -30px;
  }

  /* placeholder box for product photo */
  .photo-placeholder {
    width: 280px;
    height: 260px;
    border: 3px dashed #ffb347;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fffaf4;
    gap: 10px;
    z-index: 1;
  }
  .photo-placeholder .ph-icon { font-size: 80px; }
  .photo-placeholder .ph-text { font-size: 14px; color: #bbb; letter-spacing: 1px; }

  /* if product.jpg exists, show it */
  .product-img {
    width: 300px;
    height: 280px;
    object-fit: contain;
    z-index: 1;
  }

  /* ── 价格块 ── */
  .price-section {
    margin: 0 32px;
    border: 5px solid #FF4500;
    border-radius: 12px;
    overflow: hidden;
  }

  .price-header {
    background: #FF4500;
    color: #FFD700;
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 6px;
    padding: 8px;
  }

  .price-row {
    display: flex;
    background: #fff;
  }

  .price-cell {
    flex: 1;
    padding: 24px 16px;
    text-align: center;
    border-right: 3px solid #FF4500;
  }
  .price-cell:last-child { border-right: none; }

  .price-cell .only {
    font-size: 18px;
    color: #888;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .price-cell .num {
    font-size: 96px;
    font-weight: 900;
    color: #FF4500;
    line-height: 1;
    letter-spacing: -3px;
  }

  .price-cell .num sup {
    font-size: 40px;
    vertical-align: super;
    letter-spacing: 0;
  }

  .price-cell .per {
    font-size: 22px;
    font-weight: 900;
    color: #333;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .price-cell .badge {
    display: inline-block;
    background: #FFD700;
    color: #8B0000;
    font-size: 13px;
    font-weight: 900;
    padding: 3px 16px;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-top: 6px;
  }

  /* ── 特色一行 ── */
  .features-row {
    margin: 18px 32px 0;
    display: flex;
    gap: 10px;
  }

  .feat-chip {
    flex: 1;
    background: #fff8f0;
    border: 2px solid #FF4500;
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .feat-chip .f-icon { font-size: 26px; }
  .feat-chip .f-text { font-size: 14px; font-weight: 900; color: #333; letter-spacing: 1px; margin-top: 4px; }

  /* ── 押金行 ── */
  .deposit-bar {
    margin: 14px 32px 0;
    background: #fff8e1;
    border: 2px dashed #FFC107;
    border-radius: 10px;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .deposit-bar .d-label { font-size: 18px; font-weight: 900; color: #555; letter-spacing: 2px; }
  .deposit-bar .d-note  { font-size: 13px; color: #aaa; letter-spacing: 1px; margin-top: 2px; }
  .deposit-bar .d-num   { font-size: 28px; font-weight: 900; color: #FF6B35; }

  /* ── 二维码区 ── */
  .qr-row {
    margin: 18px 32px 0;
    display: flex;
    gap: 14px;
  }

  .qr-box {
    flex: 1;
    border: 3px solid #333;
    border-radius: 12px;
    padding: 14px;
    display: flex;
    gap: 14px;
    align-items: center;
    background: #fafafa;
  }

  .qr-box.green { border-color: #07C160; }

  .qr-box img {
    width: 90px; height: 90px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid #eee;
  }

  .qr-box .qr-info .qr-title {
    font-size: 18px;
    font-weight: 900;
    color: #222;
    letter-spacing: 1px;
  }

  .qr-box .qr-info .qr-sub {
    font-size: 13px;
    color: #888;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* ── 底部电话 ── */
  .phone-bar {
    margin: 16px 32px 0;
    background: #222;
    border-radius: 10px;
    padding: 16px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .phone-bar .p-label { font-size: 16px; color: #aaa; letter-spacing: 2px; }
  .phone-bar .p-num   { font-size: 34px; font-weight: 900; color: #FFD700; letter-spacing: 3px; }

  .footer-text {
    text-align: center;
    padding: 16px 32px 12px;
    font-size: 16px;
    color: #bbb;
    letter-spacing: 5px;
    font-weight: 900;
  }

  .bottom-stripe {
    height: 16px;
    background: linear-gradient(90deg,
      #FFD700 0%, #FFD700 25%,
      #FF4500 25%, #FF4500 50%,
      #00BFFF 50%, #00BFFF 75%,
      #32CD32 75%, #32CD32 100%
    );
  }

  @media print {
    body { background: #fff; padding: 0; }
    .no-print { display: none !important; }
    .banner { box-shadow: none; width: 100%; }
  }
</style>
</head>
<body>

<div class="no-print">
  <button onclick="window.print()">🖨️ 打印</button>
</div>

<div class="banner">

  <div class="stripe"></div>

  <div class="brand-row">
    <span class="name">悦 行</span>
    <span class="tag">电动行李箱租借</span>
  </div>

  <!-- 主标题 -->
  <div class="main-title">
    <span class="title-l1">拎着箱子</span>
    <span class="title-l2">何必走路？</span>
  </div>

  <div style="padding: 0 32px;">
    <div class="product-label">智能电动行李箱</div>
  </div>

  <!-- 产品图 — 放一张真实产品图效果最好 -->
  <div class="product-zone">
    <div class="bg-circle"></div>
    <img src="product.jpg" class="product-img" alt=""
         onerror="this.style.display='none';document.getElementById('ph').style.display='flex'">
    <div class="photo-placeholder" id="ph" style="display:none">
      <div class="ph-icon">🧳</div>
      <div class="ph-text">此处替换为产品实物图</div>
      <div class="ph-text">product.jpg</div>
    </div>
  </div>

  <!-- 价格 -->
  <div class="price-section">
    <div class="price-header">透明收费 · 随租随还</div>
    <div class="price-row">
      <div class="price-cell">
        <div class="only">只需</div>
        <div class="num"><sup>¥</sup>19</div>
        <div class="per">/ 小时</div>
      </div>
      <div class="price-cell">
        <div class="only">全天封顶</div>
        <div class="num"><sup>¥</sup>78</div>
        <div class="per">/ 天</div>
        <div class="badge">⭐ 最划算</div>
      </div>
    </div>
  </div>

  <!-- 特色 -->
  <div class="features-row">
    <div class="feat-chip">
      <div class="f-icon">🔋</div>
      <div class="f-text">免费换电</div>
    </div>
    <div class="feat-chip">
      <div class="f-icon">📱</div>
      <div class="f-text">扫码即租</div>
    </div>
    <div class="feat-chip">
      <div class="f-icon">🔒</div>
      <div class="f-text">押金秒退</div>
    </div>
    <div class="feat-chip">
      <div class="f-icon">🎒</div>
      <div class="f-text">解放双手</div>
    </div>
  </div>

  <!-- 押金 -->
  <div class="deposit-bar">
    <div>
      <div class="d-label">押金 ¥500</div>
      <div class="d-note">归还设备立即退回</div>
    </div>
    <div class="d-num">🔐 有保障</div>
  </div>

  <!-- 二维码 -->
  <div class="qr-row">
    <div class="qr-box">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=https://zuxiang.xyz&margin=4" alt="租借码">
      <div class="qr-info">
        <div class="qr-title">📱 扫码租借</div>
        <div class="qr-sub">zuxiang.xyz</div>
        <div class="qr-sub">手机扫码 · 立即使用</div>
      </div>
    </div>
    <div class="qr-box green">
      <img src="wechat.jpg" alt="微信">
      <div class="qr-info">
        <div class="qr-title">💬 加微信咨询</div>
        <div class="qr-sub">扫码添加好友</div>
        <div class="qr-sub">有问题随时联系</div>
      </div>
    </div>
  </div>

  <!-- 电话 -->
  <div class="phone-bar">
    <div class="p-label">📞 客服热线</div>
    <div class="p-num">18630721779</div>
  </div>

  <div class="footer-text">出行更悦 · 游玩无忧</div>

  <div class="bottom-stripe"></div>

</div>

</body>
</html>
